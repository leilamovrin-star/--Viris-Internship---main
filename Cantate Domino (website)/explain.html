/* ===============================
   MODAL OKNO
================================ */

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;

height:100%;

}

.modal-content{
background-color:#c9a497;
border:6px solid #9f7e6c;
width:300px;
margin:15% auto;
padding:20px;
position:relative;
border-radius:8px;
text-align:center;
}

/* repeat for other modal-content */

.close{
position:absolute;
right:10px;
top:5px;
font-size:22px;
cursor:pointer;
}

</style>

<body>

<!-- =================================
JAVASCRIPT
================================= -->

<script>

/* počakamo da se stran naloži */

document.addEventListener("DOMContentLoaded", function(){

/* =================================
PRIMER ZA EN MODAL
================================= */

const modal = document.getElementById("modal");
const openBtn = document.getElementById("openBtn");
const closeBtn = document.querySelector(".close");

/* odpre modal */

openBtn.addEventListener("click", function(){
modal.style.display="block";
});

/* zapre modal */

closeBtn.addEventListener("click", function(){
modal.style.display="none";
});

/* zapre modal če kliknemo izven */

window.addEventListener("click", function(event){

if(event.target===modal){
modal.style.display="none";
}

});

/* repeat for other modals */

});

</script>
